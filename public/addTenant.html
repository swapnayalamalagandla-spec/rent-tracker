<!DOCTYPE html>
<html>
<head>
    <title>Add Tenant</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body class="bg-light">

<!-- 🔷 Header -->
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand mb-0 h4">🏠 Rent Tracker</span>
    <button class="btn btn-danger btn-sm" onclick="goBack()">⬅ Back</button>
</nav>

<div class="container mt-5">

    <div class="card shadow p-4" style="max-width: 500px; margin: auto;">
        
        <h4 class="text-center mb-4">➕ Add Tenant</h4>

        <form id="tenantForm">

            <input type="text" class="form-control mb-3" placeholder="👤 Name" id="name" required>

            <input type="number" class="form-control mb-3" placeholder="🏢 Floor" id="floor" required>

            <input type="number" class="form-control mb-3" placeholder="💰 Rent Amount" id="rent" required>

            <input type="number" class="form-control mb-3" placeholder="💧 Water Bill" id="water" required>

            <input type="text" class="form-control mb-3" placeholder="📞 Phone Number" id="phone">

            <button type="submit" class="btn btn-primary w-100">Add Tenant</button>

        </form>

    </div>

</div>

<script>

// 🔙 Back button
function goBack() {
    window.location.href = "index.html";
}

// 📤 Submit form
document.getElementById("tenantForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const data = {
        name: document.getElementById("name").value,
        floor: document.getElementById("floor").value,
        rent: document.getElementById("rent").value,
        water_bill: document.getElementById("water").value,
        phone: document.getElementById("phone").value
    };

    fetch("/tenants/add", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    })
    .then(res => res.text())
    .then(msg => {
        alert(msg);
        window.location.href = "index.html";
    });
});

</script>

</body>
</html>
