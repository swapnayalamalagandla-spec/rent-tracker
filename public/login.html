<!DOCTYPE html>
<html>
<head>
    <title>Login - Rent Tracker</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body class="login-body">

<div class="login-container">

    <div class="login-card">

        <h2 class="text-center mb-4">🏠 Rent Tracker</h2>
        <input id="user" class="form-control mb-3" placeholder="👤 Username">
        <input id="pass" type="password" class="form-control mb-3" placeholder="🔒 Password">
        <button class="btn btn-primary w-100" onclick="login()">Login</button>

    </div>

</div>

<script>
function login() {
    const username = document.getElementById("user").value;
    const password = document.getElementById("pass").value;

    fetch("/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    credentials: "include",   // 🔥 important
    body: JSON.stringify({ username, password })
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            window.location.href = "/";
        } else {
            alert("Invalid credentials");
        }
    });
}
</script>

</body>
</html>
